<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Kapadia High School{% endblock title %}</title>
    {% load static %}
    
    <!-- Preload critical resources -->
    <link rel="preload" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" as="style">
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts - Elegant pairing -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Custom CSS -->
    <link href="{% static 'css/base.css' %}" rel='stylesheet' type='text/css'>
    <link href="{% static 'css/image-styles.css' %}" rel='stylesheet' type='text/css'>
    <link href="{% static 'css/footer.css' %}" rel='stylesheet' type='text/css'>
    <link href="{% static 'css/sticky-footer.css' %}" rel='stylesheet' type='text/css'>
    
    <!-- Meta tags for SEO and performance -->
    <meta name="description" content="Kapadia High School - Excellence in Education Since 1956">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="theme-color" content="#003264">
    
    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="{% static 'images/favicon/apple-touch-icon.png' %}">
    <link rel="icon" type="image/png" sizes="32x32" href="{% static 'images/favicon/favicon-32x32.png' %}">
    <link rel="icon" type="image/png" sizes="16x16" href="{% static 'images/favicon/favicon-16x16.png' %}">
    <link rel="manifest" href="{% static 'images/favicon/site.webmanifest' %}">
    <link rel="shortcut icon" href="{% static 'images/favicon/favicon.ico' %}">
    
    {% block page_css %}{% endblock page_css %}
    
    <!-- Global Animation Styles -->
    <style>
        :root {
            --primary-navy: #003264;
            --primary-navy-dark: #002244;
            --accent-gold: #D4AF37;
            --accent-gold-light: #E8C547;
            --text-dark: #1a1a2e;
            --text-muted: #6b7280;
            --bg-cream: #fafaf8;
            --bg-light: #f8f9fa;
            --shadow-soft: 0 4px 20px rgba(0,50,100,0.08);
            --shadow-hover: 0 12px 40px rgba(0,50,100,0.15);
            --transition-smooth: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg-cream);
            color: var(--text-dark);
            line-height: 1.7;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Cormorant Garamond', serif;
            font-weight: 600;
            letter-spacing: -0.02em;
        }
        
        /* Page load animation */
        body {
            opacity: 0;
            animation: pageReveal 0.6s ease-out forwards;
        }
        
        @keyframes pageReveal {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* Smooth scroll */
        html {
            scroll-behavior: smooth;
        }
        
        /* Selection styling */
        ::selection {
            background: var(--accent-gold);
            color: var(--primary-navy);
        }
    </style>
</head>
<body class="d-flex flex-column min-vh-100">
    <!-- Scroll to top button -->
    <button id="scrollToTop" class="scroll-to-top" aria-label="Scroll to top">
        <i class="fas fa-arrow-up"></i>
    </button>
    <!-- Header -->
    {% include 'header.html' %}
    
    <!-- Carousel Block -->
    <div class="carousel-container">
        {% block carousel %}{% endblock carousel %}
    </div>
    
    <!-- Main Content -->
    <main class="container mt-4 mb-0 flex-grow-1">
        <div class="content-wrapper">
            {% block content %}{% endblock content %}
        </div>
    </main>
    
    <!-- Footer -->
    {% include 'footer.html' %}

  <!-- Bootstrap JS Bundle - defer loading until page is rendered -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous" defer></script>

  <!-- Custom JavaScript - defer loading -->
  <script src="{% static 'js/main.js' %}" defer></script>
  <script src="{% static 'js/footer-fix.js' %}" defer></script>

  <!-- Scroll to top functionality -->
  <script>
    document.addEventListener('DOMContentLoaded', function() {
        const scrollBtn = document.getElementById('scrollToTop');
        window.addEventListener('scroll', function() {
            if (window.pageYOffset > 300) {
                scrollBtn.classList.add('visible');
            } else {
                scrollBtn.classList.remove('visible');
            }
        });
        scrollBtn.addEventListener('click', function() {
            window.scrollTo({ top: 0, behavior: 'smooth' });
        });
    });
  </script>
  
  <!-- Page-specific JavaScript -->
  {% block page_js %}
  {% endblock page_js %}
</body>

</html>
